; ==============================================================================
;  PAMELA THEME (6-Bar Version - Fixed Gaps)
; ==============================================================================

[global/wm]
margin-bottom = 0
margin-top = 0

[color]
bg = #2f354b
bg-alt = #BF1D1F28
fg = #FDFDFD
red = #F37F97
pink = #EC407A
purple = #C574DD
blue = #8897F4
cyan = #79E6F3
teal = #00B19F
green = #5ADECD
lime = #B9C244
yellow = #F2A272
amber = #FBC02D
orange = #E57C46
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB

; ==============================================================================
;  BAR 1: LAUNCHER (Far Left)
; ==============================================================================
[bar/main]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 2.5%
height = 40
offset-x = 1%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
font-0 = "Material:style=Regular:size=14;3"
font-1 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=16;4"
modules-center = launcher
enable-ipc = true

; ==============================================================================
;  BAR 2: WORKSPACES (Left)
; ==============================================================================
[bar/pam2]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 15%
height = 40
offset-x = 4%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = i3
enable-ipc = true

; ==============================================================================
;  BAR 6: SYSTEM TRAY & FILESYSTEM (THE MISSING BAR)
; ==============================================================================
[bar/pam6]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
; This sits exactly in the 20% gap
width = 15%
height = 40
offset-x = 20%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
; Added Filesystem here to fill the space usefuly
modules-center = info-cava
enable-ipc = true

; ==============================================================================
;  BAR 3: MUSIC (Center)
; ==============================================================================
[bar/pam3]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 20%
height = 40
offset-x = 36%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = music-prev music-play music-next music-song
enable-ipc = true

; ==============================================================================
;  BAR 4: STATS (Right)
; ==============================================================================
[bar/pam4]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 25%
height = 40
offset-x = 57%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 1
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = battery cpu memory filesystem pulseaudio bluetooth brightness
enable-ipc = true

; ==============================================================================
;  BAR 5: TIME & POWER (Far Right)
; ==============================================================================
[bar/pam5]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 16%
height = 40
offset-x = 83%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = date power
enable-ipc = true

; ==============================================================================
;  MODULE DEFINITIONS
; ==============================================================================

[module/launcher]
type = custom/text
format = "  "
format-foreground = #D70A53
click-left = /home/joydeepwm/.config/rofi/launchers/misc/launcher.sh

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = "  "
label-focused-foreground = ${color.yellow}
label-unfocused = "  "
label-unfocused-foreground = ${color.grey}
label-urgent = "  "
label-urgent-foreground = ${color.red}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true
format-mounted = <label-mounted>
label-mounted = "  %free% "
label-mounted-foreground = ${color.purple}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format = <label-layout>
format-prefix = "  "
format-prefix-foreground = ${color.cyan}
label-layout = %layout%

[module/mpd]
type = custom/script
tail = true
interval = 1
format = "  <label>"
format-foreground = ${color.green}
exec = playerctl metadata --format "{{ title }} - {{ artist }}" 2>/dev/null || echo "No Music"
click-left = playerctl play-pause

[module/battery]
type = internal/battery
battery = BAT1
adapter = ADP0
full-at = 99
poll-interval = 5
format-charging = <label-charging>
label-charging = "  %percentage%%"
label-charging-foreground = ${color.green}
format-discharging = <label-discharging>
label-discharging = "  %percentage%%"
label-discharging-foreground = ${color.yellow}

[module/cpu]
type = internal/cpu
interval = 1
format = <label>
label = "  %percentage%%"
label-foreground = ${color.pink}

[module/memory]
type = internal/memory
interval = 3
format = <label>

; Standard Pywal Cyan/Yellow
label-foreground = ${color.amber}

; Updated Icon to standard Nerd Font chip
label = " 󰍛 %percentage_used%%"

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${color.indigo}

[module/date]
type = internal/date
interval = 1

; Format: "Day, Month Date  Time"
; Example: "Fri, Feb 06  03:00"
date = "|   %H:%M || %a, %b %d | "

; Optional: Alternate format if you click it (Full Date)
date-alt = "%A, %d %B %Y  %H:%M:%S"

; The Label
label = %date%
label-foreground = ${colors.foreground}

; Icon prefix (Clock icon)
format-prefix = ""
format-prefix-foreground = ${colors.purple}


[module/power]
type = custom/text
format = "  "
format-foreground = ${color.red}
click-left = i3-msg exit

[module/bluetooth]
type = custom/script
exec = bluetoothctl show | grep -q "Powered: yes" && echo "  On " || echo "  Off "
interval = 5
click-left = blueman-manager &
format-foreground = ${color.blue}

[module/brightness]
type = custom/script
; Standard Pywal Yellow
format-prefix-foreground = ${colors.color3}

; Changed icon to a generic one guaranteed to exist in JetBrains Nerd Font
format-prefix = "󰃠 "

; Command to get brightness
exec = brightnessctl -m | cut -d, -f4
interval = 0.2

; Scroll to change
scroll-up = brightnessctl set +5%
scroll-down = brightnessctl set 5%-

[module/music-prev]
type = custom/text
format = "  "
format-foreground = ${color.cyan}
click-left = playerctl previous

[module/music-play]
type = custom/script
exec = playerctl status 2>/dev/null | grep -q "Playing" && echo "  " || echo "  "
interval = 1
format-foreground = ${color.green}
click-left = playerctl play-pause

[module/music-next]
type = custom/text
format = "   "
format-foreground = ${color.cyan}
click-left = playerctl next

[module/music-song]
type = custom/script
tail = true 
interval = 1
format = "  <label> "
format-foreground = ${color.fg}
exec = playerctl metadata --format "{{ title }} - {{ artist }}" 2>/dev/null || echo "No Music"

[module/info-cava]
type = custom/script
exec = /home/joydeepwm/.config/polybar/pamela/scripts/info-cava.py -f 24 -b 12 -e fffdfc,fffafe,ffeafa,ffc3d2 -c average
tail = true

[module/info-timezone]
type = custom/script
exec = /home/joydeepwm/.config/polybar/pamela/scripts/info-timezone.sh
tail = true
click-left = kill -USR1 %pid%
