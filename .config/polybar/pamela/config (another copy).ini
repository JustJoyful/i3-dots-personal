[global/wm]
margin-bottom = 0
margin-top = 0


[color]
bg = #2f354b
bg-alt = #BF1D1F28
fg = #FDFDFD
blue = #8897F4
red = #F37F97
purple = #C574DD

; ==========================================================
;   BAR 1: The Launcher (Far Left)
; ==========================================================
[bar/main]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 2.5%
height = 40
offset-x = 2%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
font-0 = "Material:style=Regular:size=14;3"
modules-center = launcher
enable-ipc = true

; ==========================================================
;   BAR 2: Workspaces (Left)
; ==========================================================
[bar/pam2]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 17%
height = 40
offset-x = 5%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = i3
enable-ipc = true

; ==========================================================
;   BAR 3: Music (Center-Left)
; ==========================================================
[bar/pam3]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 22%
height = 40
offset-x = 38.5%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = date
enable-ipc = true

; ==========================================================
;   BAR 4: Stats (Center-Right)
; ==========================================================
[bar/pam4]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 26.5%
height = 40
offset-x = 61%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 1
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = battery filesystem cpu memory pulseaudio
enable-ipc = true

; ==========================================================
;   BAR 5: Power (Far Right)
; ==========================================================
[bar/pam5]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 10%
height = 40
offset-x = 88%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = power
enable-ipc = true

; ==========================================================
;   MODULE DEFINITIONS
; ==========================================================

[module/launcher]
type = custom/text
content = "  "
content-foreground = ${color.blue}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = "  "
label-focused-foreground = ${color.purple}
label-unfocused = "  "
label-unfocused-foreground = ${color.fg}
label-urgent = "  "
label-urgent-foreground = ${color.red}

[module/date]
type = internal/date
interval = 1.0
time = "%I:%M %p"
label = " %time%"

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true
label-mounted = "  %free% "

[module/memory]
type = internal/memory
interval = 3
label = "  %percentage_used%% "

[module/cpu]
type = internal/cpu
interval = 1
label = "  %percentage%% "

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = " %percentage%% "
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
label-charging = "  %percentage%% "
label-discharging = "  %percentage%% "

[module/power]
type = custom/text
content = "  "
content-foreground = ${color.red}
click-left = i3-msg exit
