; ==============================================================================
;  PAMELA THEME (Fixed for i3wm & Playerctl)
; ==============================================================================

[global/wm]
margin-bottom = 0
margin-top = 0

[color]
bg = #2f354b
bg-alt = #BF1D1F28
fg = #FDFDFD
red = #F37F97
pink = #EC407A
purple = #C574DD
blue = #8897F4
cyan = #79E6F3
teal = #00B19F
green = #5ADECD
lime = #B9C244
yellow = #F2A272
amber = #FBC02D
orange = #E57C46
brown = #AC8476
grey = #8C8C8C
indigo = #6C77BB

; ==============================================================================
;  BAR 1: LAUNCHER (Far Left)
; ==============================================================================
[bar/main]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 2.5%
height = 40
offset-x = 1%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
font-0 = "Material:style=Regular:size=14;3"
modules-center = launcher
enable-ipc = true

; ==============================================================================
;  BAR 2: WORKSPACES (Left)
; ==============================================================================
[bar/pam2]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 15%
height = 40
offset-x = 4%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = i3
enable-ipc = true

; ==============================================================================
;  BAR 3: MUSIC (Center - FIXED)
; ==============================================================================
[bar/pam3]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 20%
height = 40
offset-x = 40%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=10;2"
font-1 = "Material:style=Regular:size=14;3"
; THIS IS THE CRITICAL FIX: Using custom script, NOT internal/mpd
modules-center = mpd
enable-ipc = true

; ==============================================================================
;  BAR 4: STATS (Right)
; ==============================================================================
[bar/pam4]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = true
width = 25%
height = 40
offset-x = 64%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 1
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = battery filesystem cpu memory pulseaudio
enable-ipc = true

; ==============================================================================
;  BAR 5: TIME & POWER (Far Right)
; ==============================================================================
[bar/pam5]
monitor-strict = false
override-redirect = true
wm-restack = i3
bottom = false
fixed-center = false
width = 10%
height = 40
offset-x = 89.5%
offset-y = 8
background = ${color.bg-alt}
foreground = ${color.fg}
radius = 6
line-size = 2
line-color = ${color.blue}
border-size = 2
border-color = ${color.bg}
padding = 2
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;2"
font-1 = "Material:style=Regular:size=14;3"
modules-center = date power
enable-ipc = true

; ==============================================================================
;  MODULES (Embedded to prevent import errors)
; ==============================================================================

[module/launcher]
type = custom/text
format = "  "
format-foreground = ${color.blue}
click-left = ~/.config/i3/scripts/menu.sh &

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = "  "
label-focused-foreground = ${color.yellow}
label-unfocused = "  "
label-unfocused-foreground = ${color.grey}
label-urgent = "  "
label-urgent-foreground = ${color.red}

[module/mpd]
; FIXED: Uses playerctl for Spotify/Firefox support
type = custom/script
tail = true
interval = 1
format = "  <label>"
format-foreground = ${color.green}
exec = playerctl metadata --format "{{ title }} - {{ artist }}" 2>/dev/null || echo "No Music"
click-left = playerctl play-pause

[module/date]
type = internal/date
interval = 1.0
time = "%I:%M %p"
format = <label>
label = " %time%"
label-foreground = ${color.fg}

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 30
fixed-values = true
format-mounted = <label-mounted>
label-mounted = "  %free%"
label-mounted-foreground = ${color.purple}

[module/memory]
type = internal/memory
interval = 3
format = <label>
label = "  %percentage_used%%"
label-foreground = ${color.amber}

[module/cpu]
type = internal/cpu
interval = 1
format = <label>
label = "  %percentage%%"
label-foreground = ${color.pink}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${color.indigo}

[module/battery]
type = internal/battery
; FIXED: Attempting BAT1 (Common for Lenovo). If this fails, try BAT0.
battery = BAT1
adapter = ADP0
full-at = 99
poll-interval = 5
format-charging = <label-charging>
label-charging = "  %percentage%%"
label-charging-foreground = ${color.green}
format-discharging = <label-discharging>
label-discharging = "  %percentage%%"
label-discharging-foreground = ${color.yellow}

[module/power]
type = custom/text
format = "  "
format-foreground = ${color.red}
click-left = i3-msg exit
